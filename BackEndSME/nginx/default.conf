# ─────────────────────────────────────────────────────────────────────────────
# BackEndSME – Nginx Reverse Proxy Configuration
#
# Traffic flow:
#   Client → Nginx :80 → Node.js api :5000 → MongoDB db :27017
#
# Port 5000 is NOT exposed to the host — all external access goes through here.
# ─────────────────────────────────────────────────────────────────────────────

# ── Upstream definition ───────────────────────────────────────────────────────
# "api" resolves to the Node.js container via Docker internal DNS.
# keepalive reuses TCP connections to the upstream (reduces latency).
upstream api_backend {
    server api:5000;
    keepalive 32;
}

# ── Gzip compression ─────────────────────────────────────────────────────────
# Compress JSON API responses and common web assets.
# Activated here at http-block level so it applies across all server blocks.
gzip              on;
gzip_comp_level   5;          # 1 (fastest) … 9 (best ratio) — 5 is a good balance
gzip_min_length   1024;       # do not compress tiny responses
gzip_proxied      any;        # compress even when response comes from upstream
gzip_vary         on;         # add Vary: Accept-Encoding header
gzip_types
    application/json
    application/javascript
    text/plain
    text/css
    text/xml
    text/javascript
    application/x-javascript
    application/xml+rss;

# ── Server block ─────────────────────────────────────────────────────────────
server {
    listen       80;
    server_name  _;            # catch-all — replace with your domain in production

    # Allow uploads up to 20 MB (product images, BOM files, bulk CSV imports)
    client_max_body_size 20M;

    # ── Security headers ──────────────────────────────────────────────────────
    # Applied to every response this server block sends.
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Common proxy header snippet ───────────────────────────────────────────
    # These headers let Express / JWT / rate-limiter see the real client IP
    # and protocol instead of Nginx's internal address.
    # Requires `app.set('trust proxy', 1)` in server.js (already set).

    # ── API routes (/api and /api-docs) ───────────────────────────────────────
    location /api {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;

        # Pass real client information to Node.js
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Disable keep-alive header forwarding (managed by the upstream block above)
        proxy_set_header   Connection        "";

        # Timeouts — raise if you have long-running aggregation endpoints
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Swagger interactive docs — proxied separately so the UI assets load correctly
    location /api-docs {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Root / health check ───────────────────────────────────────────────────
    # Proxies the Express root route (returns "SME Back-End API — v1 ready").
    # In production you may replace this with a static landing page.
    location / {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Static files ──────────────────────────────────────────────────────────
    # Uncomment the block below once a public/ directory is created in the project.
    # Files are served directly by Nginx (no round-trip to Node.js).
    #
    # location /public {
    #     alias        /app/public;
    #     expires      7d;
    #     add_header   Cache-Control "public, immutable";
    #     access_log   off;
    # }
    #
    # location /uploads {
    #     alias        /app/uploads;
    #     expires      30d;
    #     add_header   Cache-Control "public";
    #     access_log   off;
    # }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
