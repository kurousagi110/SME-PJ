version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BackEndSME – Docker Compose stack
#
# Services:
#   nginx — Nginx reverse proxy (public entry point, port 80)
#   api   — Node.js Express application (internal only, port 5000)
#   db    — MongoDB 7 (internal only, port 27017 in named volume)
#
# Traffic flow:
#   Client → nginx:80 → api:5000 → db:27017
#
# Usage:
#   docker-compose up --build -d          # build & start all services
#   docker-compose logs -f api            # stream api logs
#   docker-compose logs -f nginx          # stream nginx access/error logs
#   docker-compose down                   # stop (keeps data volume)
#   docker-compose down -v                # stop + delete data volume
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sme_nginx
    restart: unless-stopped
    ports:
      - "80:80"                             # sole public-facing port
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment once a public/ directory exists in the project:
      # - ./public:/app/public:ro
    depends_on:
      - api
    networks:
      - sme_network

  # ── Application ──────────────────────────────────────────────────────────────
  # Port 5000 is intentionally NOT mapped to the host.
  # All external traffic must enter through the nginx service.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sme_api
    restart: unless-stopped
    # ↓ No host port mapping — api is reachable only within sme_network
    expose:
      - "5000"
    environment:
      # Server
      NODE_ENV: production
      PORT: 5000
      HOST_NAME: http://localhost

      # ── Database ──────────────────────────────────────────────────────────
      # "db" resolves to the MongoDB container via Docker internal DNS.
      MONGO_URI: mongodb://db:27017
      SME_DB_NAME: SME_db_mongo

      # ── JWT ───────────────────────────────────────────────────────────────
      # ⚠️  Replace these values with strong random secrets before deploying.
      JWT_SECRET: replace_with_strong_secret
      JWT_REFRESH_SECRET: replace_with_different_strong_secret
      ACCESS_EXPIRES: 15m
      REFRESH_EXPIRES: 7d

      # ── CORS ──────────────────────────────────────────────────────────────
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173

      # ── Rate limiting & pool (optional – defaults are safe) ───────────────
      # RATE_LIMIT_MAX: 300
      # RATE_LIMIT_AUTH_MAX: 20
      # DB_POOL_MAX: 10
      # DB_POOL_MIN: 2
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sme_network

  # ── Database ─────────────────────────────────────────────────────────────────
  # Port 27017 is intentionally NOT mapped to the host in production.
  # Remove the ports block below once you no longer need Compass / Studio 3T access.
  db:
    image: mongo:7
    container_name: sme_db
    restart: unless-stopped
    ports:
      - "27017:27017"           # optional: expose for local GUI tools only
    volumes:
      - mongodb_data:/data/db   # persist data across container restarts
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sme_network

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local

networks:
  sme_network:
    driver: bridge
