version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# SME Full-Stack — Docker Compose
#
# Services:
#   nginx    — Nginx reverse proxy (public entry point, port 80)
#   api      — Node.js Express backend (internal :5000)
#   frontend — Next.js frontend (internal :3000)
#   db       — MongoDB 7 (internal :27017, data in named volume)
#
# Traffic flow:
#   Browser → nginx:80
#     /api/*  → api:5000   → db:27017
#     /*      → frontend:3000
#
# Usage:
#   docker-compose up --build -d          # build & start all services
#   docker-compose logs -f api            # stream backend logs
#   docker-compose logs -f frontend       # stream frontend logs
#   docker-compose down                   # stop (keeps volume)
#   docker-compose down -v                # stop + delete volume
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Reverse Proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sme_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - sme_network

  # ── Backend API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./BackEndSME
      dockerfile: Dockerfile
    container_name: sme_api
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      HOST_NAME: http://localhost

      # Database — "db" resolved via Docker DNS
      MONGO_URI: mongodb://db:27017
      SME_DB_NAME: SME_db_mongo

      # JWT — replace with strong random secrets before deploying
      JWT_SECRET: replace_with_strong_secret
      JWT_REFRESH_SECRET: replace_with_different_strong_secret
      ACCESS_EXPIRES: 15m
      REFRESH_EXPIRES: 7d

      # CORS — allow the frontend origin
      ALLOWED_ORIGINS: http://localhost,http://localhost:3000

      # Rate limiting & pool (optional — defaults are safe)
      # RATE_LIMIT_MAX: 300
      # RATE_LIMIT_AUTH_MAX: 20
      # DB_POOL_MAX: 10
      # DB_POOL_MIN: 2
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sme_network

  # ── Frontend (Next.js) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./FrontEndSME
      dockerfile: Dockerfile
      args:
        # In production, browser requests to /api/* go through Nginx → api service.
        # The browser hits http://<host>/api/v1, so the URL is host-relative.
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: sme_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Server-side fetch inside Docker requires an absolute URL.
      # NEXT_PUBLIC_API_URL is a relative path baked into the bundle for browser use (/api/v1).
      # API_INTERNAL_URL is a runtime-only var read by http.ts on the server side.
      API_INTERNAL_URL: http://api:5000/api/v1
    depends_on:
      - api
    networks:
      - sme_network

  # ── Database ──────────────────────────────────────────────────────────────────
  db:
    image: mongo:7
    container_name: sme_db
    restart: unless-stopped
    # Remove or comment out the ports block once GUI tool access is no longer needed
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sme_network

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local

networks:
  sme_network:
    driver: bridge
