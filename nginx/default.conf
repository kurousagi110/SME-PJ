# ─────────────────────────────────────────────────────────────────────────────
# SME Full-Stack — Nginx Reverse Proxy
#
# Traffic flow:
#   Client → Nginx :80
#     /api/*         → api (Node.js Express)  :5000
#     everything else → frontend (Next.js)    :3000
#
# Both api and frontend are reachable only within the Docker bridge network.
# ─────────────────────────────────────────────────────────────────────────────

upstream api_backend {
    server api:5000;
    keepalive 32;
}

upstream frontend {
    server frontend:3000;
    keepalive 16;
}

# ── Rate limit zones ──────────────────────────────────────────────────────────
# Edge-side rate limiting so brute force / DDoS is rejected before hitting
# the Node.js event loop. Generic per-IP API budget, plus a tighter budget
# for the auth endpoints (login + refresh).
limit_req_zone $binary_remote_addr zone=api_zone:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_zone:10m  rate=10r/m;

# ── Gzip ─────────────────────────────────────────────────────────────────────
gzip              on;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_proxied      any;
gzip_vary         on;
gzip_types
    application/json
    application/javascript
    text/plain
    text/css
    text/xml
    text/javascript
    application/x-javascript
    application/xml+rss
    image/svg+xml
    application/wasm
    font/woff2
    font/woff
    font/ttf
    application/octet-stream;

# ── Server block ──────────────────────────────────────────────────────────────
server {
    listen      80;
    server_name _;

    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header X-XSS-Protection       "1; mode=block"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    # CSP:
    #   script-src 'self' (NO unsafe-inline) — Next.js production builds do
    #     not require inline scripts; removing it blocks the most common XSS vector.
    #   style-src 'self' 'unsafe-inline' — Next.js injects inline styles for
    #     hydration; XSS via inline CSS is a much smaller risk surface.
    #   img-src 'self' data: https: — data: for inline base64 avatars, https:
    #     for external product images.
    #   connect-src 'self' ws: wss: — allow WebSocket to self (Socket.io).
    #   frame-ancestors 'self' — block clickjacking via iframe.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=(), payment=()" always;

    # Deny hidden files / dotfiles (.env, .git, .htaccess, ...)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Auth endpoints — stricter limit (10 req/min per IP) ──────────────────
    location ~ ^/api/v1/users/(login|refresh)$ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api {
        limit_req zone=api_zone burst=60 nodelay;
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Socket.io WebSocket ───────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ── Next.js static assets (_next/*) ──────────────────────────────────────
    # Cache Next.js immutable build artifacts aggressively
    location /_next/static {
        proxy_pass       http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires          1y;
        add_header       Cache-Control "public, immutable";
        access_log       off;
    }

    # ── Next.js HMR / WebSocket (dev only, harmless in prod) ─────────────────
    location /_next/webpack-hmr {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # ── Everything else → Next.js ─────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
